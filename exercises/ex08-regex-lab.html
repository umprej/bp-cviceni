<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Laboratoř regulárních výrazů</title>
<link rel="stylesheet" href="exercises.css">
<style>
.word-mono { font-family: monospace; font-size: 14px; }
#results, #genSection { display: none; }
</style>
</head>
<body>
<h2>Cvičení: Laboratoř regulárních výrazů</h2>

<div class="note note-info">Priorita operátorů: iterace (*) &gt; zřetězení (·) &gt; sjednocení (+)</div>

<label for="regexInput">Formální regulární výraz:</label>
<input type="text" id="regexInput" value="ab*+c">

<div class="error" id="errorBox"></div>

<label for="testWords">Testovací slova (jedno na řádek):</label>
<textarea id="testWords">a
ab
abb
abbb
c
ac
bc
ba</textarea>

<div class="buttons">
  <button class="btn btn-primary" onclick="runTest()">Testovat výraz</button>
  <button class="btn btn-secondary" onclick="resetAll()">Resetovat</button>
</div>

<div id="genSection">
  <h3>Generovaná slova délky 0–5</h3>
  <div class="badge-container" id="genWords"></div>
</div>

<div id="results">
  <h3>Výsledky testování</h3>
  <div id="resultList"></div>
</div>

<script>
function formalToJS(formal) {
  let s = formal.trim();
  // ε → empty string
  s = s.replace(/ε/g, '');
  // + → | (union)
  s = s.replace(/\+/g, '|');
  // · removed (implicit concat handled by user writing letters next to each other)
  s = s.replace(/·/g, '');
  return '^(?:' + s + ')$';
}

function generateWords(maxLen) {
  const alpha = ['a', 'b', 'c'];
  const words = [''];
  const queue = [''];
  while (queue.length) {
    const w = queue.shift();
    if (w.length < maxLen) {
      for (const ch of alpha) {
        const nw = w + ch;
        words.push(nw);
        queue.push(nw);
      }
    }
  }
  words.sort((a, b) => a.length - b.length || a.localeCompare(b));
  return words;
}

function runTest() {
  const formal = document.getElementById('regexInput').value;
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';

  let pattern;
  try {
    const jsPattern = formalToJS(formal);
    pattern = new RegExp(jsPattern);
  } catch (e) {
    errorBox.textContent = 'Chyba v regulárním výrazu: ' + e.message;
    errorBox.style.display = 'block';
    return;
  }

  // Generated words
  const allWords = generateWords(5);
  const genContainer = document.getElementById('genWords');
  genContainer.innerHTML = '';
  for (const w of allWords) {
    const display = w === '' ? 'ε' : w;
    const match = pattern.test(w);
    const span = document.createElement('span');
    span.className = 'badge ' + (match ? 'badge-match' : 'badge-no');
    span.textContent = display;
    genContainer.appendChild(span);
  }
  document.getElementById('genSection').style.display = 'block';

  // Test words
  const lines = document.getElementById('testWords').value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const resultList = document.getElementById('resultList');
  resultList.innerHTML = '';
  for (const word of lines) {
    const testWord = word === 'ε' ? '' : word;
    const match = pattern.test(testWord);
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = '<span class="' + (match ? 'icon-ok' : 'icon-fail') + '">' + (match ? '✓' : '✗') + '</span><span class="word-mono">' + word + '</span>';
    resultList.appendChild(div);
  }
  document.getElementById('results').style.display = 'block';
}

function resetAll() {
  document.getElementById('regexInput').value = 'ab*+c';
  document.getElementById('testWords').value = 'a\nab\nabb\nabbb\nc\nac\nbc\nba';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('genSection').style.display = 'none';
  document.getElementById('results').style.display = 'none';
}

// Iframe resize messaging
function sendHeight() {
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'iframeResize', height: h }, '*');
}
const ro = new ResizeObserver(sendHeight);
ro.observe(document.body);
window.addEventListener('load', sendHeight);
</script>
</body>
</html>
