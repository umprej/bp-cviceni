<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Laboratoř regulárních výrazů</title>
<link rel="stylesheet" href="exercises.css">
<style>
.word-mono { font-family: monospace; font-size: 14px; }
#results, #genSection { display: none; }
</style>
</head>
<body>
<h2>Cvičení: Laboratoř regulárních výrazů</h2>

<div class="note note-info">Priorita operátorů: iterace (*) &gt; zřetězení (·) &gt; sjednocení (+)</div>

<label for="regexInput">Formální regulární výraz:</label>
<input type="text" id="regexInput" value="ab*+c">

<div class="error" id="errorBox"></div>

<label for="testWords">Testovací slova (jedno na řádek):</label>
<textarea id="testWords">a
ab
abb
abbb
c
ac
bc
ba</textarea>

<div class="buttons">
  <button class="btn btn-primary" onclick="runTest()">Testovat výraz</button>
  <button class="btn btn-secondary" onclick="resetAll()">Resetovat</button>
</div>

<div id="genSection">
  <h3>Generovaná slova délky 0–5</h3>
  <div class="badge-container" id="genWords"></div>
</div>

<div id="results">
  <h3>Výsledky testování</h3>
  <div id="resultList"></div>
</div>

<script src="exercises.js"></script>
<script>
// Laborator regularnich vyrazu - testovani formalniho regexu proti slovum
// Prevadi formalni zapis (+ pro sjednoceni, * pro iteraci) na JS regex

// Prevod formalniho regexu na JS regex - nahradi formalni operatory za JS ekvivalenty
function formalToJS(formal) {
  var s = formal.trim();
  s = s.replace(/ε/g, '');     // epsilon = prazdne slovo
  s = s.replace(/\+/g, '|');   // + ve formalni definici = | v JS (sjednoceni)
  s = s.replace(/·/g, '');     // explicitni zretezeni neni v JS potreba
  return '^(?:' + s + ')$';    // anchory aby matchoval cele slovo
}

// BFS generovani vsech slov nad abecedou {a,b,c} do dane delky
function generateWords(maxLen) {
  var alpha = ['a', 'b', 'c'];
  var words = [''];
  var queue = [''];
  while (queue.length) {
    var w = queue.shift();
    if (w.length < maxLen) {
      for (var ci = 0; ci < alpha.length; ci++) {
        var nw = w + alpha[ci];
        words.push(nw);
        queue.push(nw);
      }
    }
  }
  // Serazeni podle delky, pak abecedne
  words.sort(function(a, b) { return a.length - b.length || a.localeCompare(b); });
  return words;
}

// Hlavni testovaci funkce - prevede regex, vygeneruje slova a otestuje shodu
function runTest() {
  var formal = $('regexInput').value;
  var errorBox = $('errorBox');
  errorBox.style.display = 'none';

  var pattern;
  try {
    var jsPattern = formalToJS(formal);
    pattern = new RegExp(jsPattern);
  } catch (e) {
    errorBox.textContent = 'Chyba v regulárním výrazu: ' + e.message;
    errorBox.style.display = 'block';
    return;
  }

  // Generovana slova - kazde oznacime jestli matchuje nebo ne
  var allWords = generateWords(5);
  var genContainer = $('genWords');
  genContainer.innerHTML = '';
  for (var i = 0; i < allWords.length; i++) {
    var w = allWords[i];
    var display = w === '' ? 'ε' : w;
    var match = pattern.test(w);
    var span = el('span', { cls: 'badge ' + (match ? 'badge-match' : 'badge-no'), text: display });
    genContainer.appendChild(span);
  }
  $('genSection').style.display = 'block';

  // Testovani slov zadanych uzivatelem
  var lines = $('testWords').value.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
  var resultList = $('resultList');
  resultList.innerHTML = '';
  for (var j = 0; j < lines.length; j++) {
    var word = lines[j];
    var testWord = word === 'ε' ? '' : word;
    var m = pattern.test(testWord);
    var div = el('div', { cls: 'result-item', html: '<span class="' + (m ? 'icon-ok' : 'icon-fail') + '">' + (m ? '✓' : '✗') + '</span><span class="word-mono">' + word + '</span>' });
    resultList.appendChild(div);
  }
  $('results').style.display = 'block';
}

// Reset na vychozi hodnoty
function resetAll() {
  $('regexInput').value = 'ab*+c';
  $('testWords').value = 'a\nab\nabb\nabbb\nc\nac\nbc\nba';
  $('errorBox').style.display = 'none';
  $('genSection').style.display = 'none';
  $('results').style.display = 'none';
}
</script>
</body>
</html>
