<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Množinové operace — přiřazování</title>
<link rel="stylesheet" href="exercises.css">
</head>
<body>

<h2>Cvičení: Množinové operace — přiřazování</h2>
<p class="desc">Máme množiny M = {1, 2, 3, 4} a N = {3, 4, 5, 6}. Přetáhněte operace do správných výsledků.</p>

<div class="section">
  <div class="sets">M = {1, 2, 3, 4} &nbsp;&nbsp; N = {3, 4, 5, 6}</div>

  <div class="drag-source" id="source"></div>

  <div class="drop-zones" id="zones"></div>

  <div class="buttons">
    <button class="btn btn-primary" id="checkBtn">Zkontrolovat</button>
    <button class="btn btn-secondary" id="resetBtn">Resetovat</button>
  </div>

  <div class="feedback" id="feedback"></div>
</div>

<script src="exercises.js"></script>
<script>
// Cviceni na prirazovani mnozinovych operaci k vysledkum (drag & drop)
// M = {1,2,3,4}, N = {3,4,5,6}

// spravne pary operace -> vysledek
var pairs = [
  { op: 'M ∩ N', result: '{3, 4}' },
  { op: 'M ∪ N', result: '{1, 2, 3, 4, 5, 6}' },
  { op: 'M \\ N', result: '{1, 2}' }
];

var sourceEl = $('source');
var zonesEl = $('zones');
var feedbackEl = $('feedback');
var draggedOp = null;

// Zamichani pole (Fisher-Yates)
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// Sestavi cele UI - tahaci operace a cilove zony
function buildUI() {
  feedbackEl.className = 'feedback';
  feedbackEl.style.display = 'none';
  sourceEl.innerHTML = '';
  zonesEl.innerHTML = '';

  // zamichat operace i vysledky zvlast, at to neni trivialni
  var shuffledOps = shuffle(pairs.map(function(p) { return p.op; }));
  var shuffledResults = shuffle(pairs.slice());

  shuffledOps.forEach(function(op) {
    var item = el('div', { cls: 'drag-item', text: op, attrs: { draggable: 'true' } });
    item.dataset.op = op;
    item.addEventListener('dragstart', onDragStart);
    sourceEl.appendChild(item);
  });

  shuffledResults.forEach(function(p) {
    var zone = el('div', { cls: 'drop-zone', html: '<div class="label">' + p.result + '</div><div class="placeholder">Přetáhněte sem</div>' });
    zone.dataset.result = p.result;
    zone.addEventListener('dragover', onDragOver);
    zone.addEventListener('dragleave', onDragLeave);
    zone.addEventListener('drop', onDrop);
    zonesEl.appendChild(zone);
  });
}

// --- Drag & drop handlery ---

function onDragStart(e) {
  draggedOp = e.target.dataset.op;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedOp);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('over');
}

// Hlavni logika dropu - resi i presun mezi zonami
function onDrop(e) {
  e.preventDefault();
  var zone = e.currentTarget;
  zone.classList.remove('over');
  var op = e.dataTransfer.getData('text/plain');
  if (!op) return;

  // kdyz uz tam neco je, vratit to zpet do source
  var existing = zone.querySelector('.placed');
  if (existing) {
    returnToSource(existing.dataset.op);
    existing.remove();
  }

  // odebrat ze zdrojove oblasti
  var sourceItem = sourceEl.querySelector('[data-op="' + CSS.escape(op) + '"]');
  if (sourceItem) sourceItem.remove();

  // operace muze byt jeste v jine zone - presunout ji sem
  document.querySelectorAll('.drop-zone .placed').forEach(function(pl) {
    if (pl.dataset.op === op) {
      returnToSource(op);
      pl.remove();
      showPlaceholder(pl.closest('.drop-zone'));
    }
  });
  var dupSource = sourceEl.querySelector('[data-op="' + CSS.escape(op) + '"]');
  if (dupSource) dupSource.remove();

  var placeholder = zone.querySelector('.placeholder');
  if (placeholder) placeholder.style.display = 'none';

  // vytvorit umisteny element v zone
  var placed = el('div', { cls: 'placed', text: op, attrs: { draggable: 'true' } });
  placed.dataset.op = op;
  // umoznit pretahnout zpet ze zony
  placed.addEventListener('dragstart', function(ev) {
    draggedOp = op;
    ev.dataTransfer.effectAllowed = 'move';
    ev.dataTransfer.setData('text/plain', op);
    setTimeout(function() {
      placed.remove();
      showPlaceholder(zone);
    }, 0);
  });
  zone.appendChild(placed);

  // smazat stary feedback pokud je
  var zf = zone.querySelector('.zone-feedback');
  if (zf) zf.remove();

  notifyResize();
}

// Vrati operaci zpet do zdrojove oblasti
function returnToSource(op) {
  var item = el('div', { cls: 'drag-item', text: op, attrs: { draggable: 'true' } });
  item.dataset.op = op;
  item.addEventListener('dragstart', onDragStart);
  sourceEl.appendChild(item);
}

// Ukaze placeholder text kdyz je zona prazdna
function showPlaceholder(zone) {
  if (!zone) return;
  var placed = zone.querySelector('.placed');
  if (!placed) {
    var ph = zone.querySelector('.placeholder');
    if (ph) ph.style.display = '';
  }
}

// Drop zpet do zdrojove oblasti
sourceEl.addEventListener('dragover', function(e) { e.preventDefault(); });
sourceEl.addEventListener('drop', function(e) {
  e.preventDefault();
  var op = e.dataTransfer.getData('text/plain');
  if (!op) return;
  // odebrat z cilove zony
  document.querySelectorAll('.drop-zone .placed').forEach(function(pl) {
    if (pl.dataset.op === op) {
      var z = pl.closest('.drop-zone');
      pl.remove();
      showPlaceholder(z);
    }
  });
  if (!sourceEl.querySelector('[data-op="' + CSS.escape(op) + '"]')) {
    returnToSource(op);
  }
  notifyResize();
});

// Kontrola spravnosti prirazeni
$('checkBtn').addEventListener('click', function() {
  var correctMap = {};
  pairs.forEach(function(p) { correctMap[p.result] = p.op; });

  var allCorrect = true;
  var allFilled = true;

  document.querySelectorAll('.drop-zone').forEach(function(zone) {
    var old = zone.querySelector('.zone-feedback');
    if (old) old.remove();

    var placed = zone.querySelector('.placed');
    var result = zone.dataset.result;
    var expected = correctMap[result];

    var fb = el('div', { cls: 'zone-feedback' });

    if (!placed) {
      allFilled = false;
      allCorrect = false;
      fb.className += ' bad';
      fb.textContent = 'Sem patří operace.';
    } else if (placed.dataset.op === expected) {
      fb.className += ' ok';
      fb.textContent = 'Správně!';
    } else {
      allCorrect = false;
      fb.className += ' bad';
      fb.textContent = 'Nesprávně.';
    }
    zone.appendChild(fb);
  });

  feedbackEl.className = 'feedback ' + (allCorrect ? 'correct' : 'incorrect');
  feedbackEl.style.display = 'block';
  feedbackEl.textContent = allCorrect
    ? 'Výborně! Všechny operace jsou přiřazeny správně.'
    : (allFilled ? 'Některé přiřazení nejsou správné. Zkuste to znovu.' : 'Přiřaďte všechny operace.');
  notifyResize();
});

$('resetBtn').addEventListener('click', function() {
  buildUI();
  notifyResize();
});

buildUI();
</script>
</body>
</html>
