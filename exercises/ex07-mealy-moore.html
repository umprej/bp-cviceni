<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Mealyho vs. Moorův automat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f4f4f4; color: #333; padding: 20px; line-height: 1.6; font-size: 14px;
}
h2 { margin-bottom: 6px; font-size: 1.3em; }
p.desc { margin-bottom: 16px; color: #555; }
.btn { display: inline-block; cursor: pointer; border: none; color: #fff; border-radius: 4px; padding: 7px 16px; font-size: 14px; margin-right: 6px; }
.btn-primary { background: #0f6cbf; }
.btn-primary:hover { background: #0d5da3; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.question { background: #fff; border-radius: 6px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.question .label { font-family: monospace; font-size: 15px; margin-bottom: 10px; font-weight: 600; }
.feedback { padding: 8px 12px; border-radius: 4px; margin-top: 8px; font-size: 13px; }
.feedback.correct { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
.feedback.incorrect { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
.summary { background: #fff; border-radius: 6px; padding: 16px; margin-top: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 1.1em; font-weight: 600; }
</style>
</head>
<body>
<h2>Cvičení: Mealyho vs. Moorův automat</h2>
<p class="desc">Určete, zda se jedná o Mealyho nebo Moorův automat.</p>

<div id="questions"></div>
<div id="summary"></div>

<script>
(function(){
  var questions = [
    { text: '\u03BB: Q \u00D7 \u03A3 \u2192 O', answer: 'Mealy', explanation: 'Výstupní funkce závisí na aktuálním stavu a vstupním symbolu' },
    { text: '\u03BB: Q \u2192 O', answer: 'Moore', explanation: 'Výstupní funkce závisí výhradně na stavu' },
    { text: 'Délka výstupního řetězce = délka vstupního řetězce', answer: 'Mealy', explanation: 'Výstup se produkuje během každého přechodu' },
    { text: 'Délka výstupního řetězce = (délka vstupního) + 1', answer: 'Moore', explanation: 'Výstup se produkuje při vstupu do stavů, včetně počátečního' },
    { text: 'Výstup se produkuje při vstupu do stavu', answer: 'Moore', explanation: 'Výstup je asociován se stavem' },
    { text: 'Výstup se produkuje během přechodu', answer: 'Mealy', explanation: 'Výstup je asociován se přechodem a vstupním symbolem' }
  ];

  var score = 0, answered = 0;
  var container = document.getElementById('questions');
  var summaryEl = document.getElementById('summary');

  function resize() {
    parent.postMessage({ type: 'iframeResize', height: document.documentElement.scrollHeight }, '*');
  }

  questions.forEach(function(q, i) {
    var div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = '<div class="label">' + (i + 1) + '. ' + q.text + '</div>' +
      '<button class="btn btn-primary" data-q="' + i + '" data-val="Mealy">Mealy</button>' +
      '<button class="btn btn-primary" data-q="' + i + '" data-val="Moore">Moore</button>' +
      '<div id="fb' + i + '"></div>';
    container.appendChild(div);
  });

  container.addEventListener('click', function(e) {
    var btn = e.target;
    if (!btn.dataset.q) return;
    var idx = parseInt(btn.dataset.q);
    var fbEl = document.getElementById('fb' + idx);
    if (fbEl.innerHTML) return;

    var chosen = btn.dataset.val;
    var correct = questions[idx].answer === chosen;
    if (correct) score++;
    answered++;

    var btns = btn.parentElement.querySelectorAll('button');
    btns.forEach(function(b) { b.disabled = true; });

    fbEl.innerHTML = '<div class="feedback ' + (correct ? 'correct' : 'incorrect') + '">' +
      (correct ? '\u2713 Správně!' : '\u2717 Špatně. Správná odpověď: ' + questions[idx].answer) +
      ' \u2014 ' + questions[idx].explanation + '</div>';

    if (answered === questions.length) {
      summaryEl.innerHTML = '<div class="summary">Výsledek: ' + score + '/' + questions.length + ' správných odpovědí</div>';
    }
    resize();
  });

  window.addEventListener('load', resize);
  new MutationObserver(resize).observe(document.body, { childList: true, subtree: true });
})();
</script>
</body>
</html>
