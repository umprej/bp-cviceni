<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Chomského hierarchie — seřazení</title>
<link rel="stylesheet" href="exercises.css">
<style>
.item-label { font-size: 14px; font-weight: 500; }
</style>
</head>
<body>
<h2>Cvičení: Chomského hierarchie — seřazení</h2>
<p class="desc">Seřaďte typy gramatik od nejzávislnějšího (nahoře) k nejobecnějšímu (dole):</p>

<ul class="sort-list" id="sortList"></ul>

<div class="buttons">
  <button class="btn btn-primary" onclick="checkOrder()">Zkontrolovat</button>
  <button class="btn btn-secondary" onclick="resetOrder()">Resetovat</button>
</div>

<div class="feedback" id="feedback"></div>

<script src="exercises.js"></script>
<script>
// Cviceni na serazeni typu gramatik v Chomskeho hierarchii (drag & drop)
// Uzivatel pretahuje polozky a kontroluje spravne poradi

// Definice typu gramatik s jejich ID pro overeni poradi
var items = [
  { id: 1, label: 'Typ 3 — Regulární' },
  { id: 2, label: 'Typ 2 — Bezkontextová' },
  { id: 3, label: 'Typ 1 — Kontextová' },
  { id: 0, label: 'Typ 0 — Neomezená' }
];

var initialOrder = [3, 1, 0, 2]; // zamichane poradi na zacatku
var correctIds = [1, 2, 3, 0];   // spravne poradi: Typ 3 -> Typ 2 -> Typ 1 -> Typ 0
var currentOrder = initialOrder.slice();

var dragIdx = null;
var touchDragIdx = null;

// Vykresleni seznamu polozek s drag & drop handlery
function render() {
  var list = $('sortList');
  list.innerHTML = '';
  for (var pos = 0; pos < currentOrder.length; pos++) {
    var item = items[currentOrder[pos]];
    var li = el('li', { cls: 'sort-item', html: '<span class="num-badge">' + (pos + 1) + '</span><span class="item-label">' + item.label + '</span>' });
    li.draggable = true;
    li.dataset.pos = pos;
    li.addEventListener('dragstart', onDragStart);
    li.addEventListener('dragend', onDragEnd);
    li.addEventListener('dragover', onDragOver);
    li.addEventListener('dragenter', onDragEnter);
    li.addEventListener('dragleave', onDragLeave);
    li.addEventListener('drop', onDrop);
    li.addEventListener('touchstart', onTouchStart, { passive: false });
    li.addEventListener('touchmove', onTouchMove, { passive: false });
    li.addEventListener('touchend', onTouchEnd);
    list.appendChild(li);
  }
}

// Drag & drop eventy pro desktop
function onDragStart(e) {
  dragIdx = parseInt(e.currentTarget.dataset.pos);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); dragIdx = null; }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragEnter(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var dropIdx = parseInt(e.currentTarget.dataset.pos);
  if (dragIdx !== null && dragIdx !== dropIdx) {
    // Presunuti polozky z puvodni pozice na novou
    var moved = currentOrder.splice(dragIdx, 1)[0];
    currentOrder.splice(dropIdx, 0, moved);
    render();
  }
}

// Touch eventy pro mobily
function onTouchStart(e) {
  touchDragIdx = parseInt(e.currentTarget.dataset.pos);
  e.currentTarget.classList.add('dragging');
}
function onTouchMove(e) { e.preventDefault(); }
function onTouchEnd(e) {
  if (touchDragIdx === null) return;
  var touch = e.changedTouches[0];
  var target = document.elementFromPoint(touch.clientX, touch.clientY);
  var li = target ? target.closest('.sort-item') : null;
  if (li) {
    var dropIdx = parseInt(li.dataset.pos);
    if (touchDragIdx !== dropIdx) {
      var moved = currentOrder.splice(touchDragIdx, 1)[0];
      currentOrder.splice(dropIdx, 0, moved);
    }
  }
  touchDragIdx = null;
  render();
}

// Kontrola poradi v hierarchii
function checkOrder() {
  var fb = $('feedback');
  var ids = currentOrder.map(function(idx) { return items[idx].id; });
  var correct = ids.every(function(id, i) { return id === correctIds[i]; });
  if (correct) {
    fb.className = 'feedback correct';
    fb.textContent = '✓ Správně! Pořadí Chomského hierarchie je správné.';
  } else {
    fb.className = 'feedback incorrect';
    fb.textContent = '✗ Chybně. Zkuste znovu. Hint: Od nejrestriktivnější (Typ 3) k nejobecnější (Typ 0).';
  }
}

function resetOrder() {
  currentOrder = initialOrder.slice();
  $('feedback').className = 'feedback';
  $('feedback').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
