<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Interaktivní stavba grafů</title>
<link rel="stylesheet" href="exercises.css">
<style>
.btn.active { outline: 3px solid #ffc107; }
.analysis {
  background: #fff; border-radius: 6px; padding: 14px 18px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
</style>
</head>
<body>
<h2>Cvičení: Interaktivní stavba grafů</h2>
<p class="desc">Sestavte graf klikáním na plátno (uzly) a propojte je hranami. Sledujte, jak se mění vlastnosti grafu.</p>

<div class="toolbar">
  <button class="btn btn-primary active" id="btnNode" onclick="setMode('node')">+ Uzel</button>
  <button class="btn btn-primary" id="btnEdge" onclick="setMode('edge')">↔ Hrana</button>
  <button class="btn btn-secondary" id="btnMove" onclick="setMode('move')">✋ Přesun</button>
  <button class="btn btn-danger" id="btnDelete" onclick="setMode('delete')">✕ Smazat</button>
  <button class="btn btn-secondary" onclick="clearAll()">Vymazat vše</button>
  <label class="toggle">
    <input type="checkbox" id="directedToggle" onchange="toggleDirected()">
    Orientovaný graf
  </label>
</div>

<div class="canvas-wrap" id="canvas">
  <svg class="edges" id="edgeSvg">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
      </marker>
    </defs>
  </svg>
</div>

<div class="analysis">
  <h3>Vlastnosti grafu</h3>
  <div id="props"></div>
</div>

<div class="challenge">
  <h3>Úkoly</h3>
  <div id="challenges"></div>
</div>

<p class="help-text">Tip: V režimu „Hrana" klikněte na zdrojový uzel, pak na cílový. V režimu „Smazat" klikněte na uzel nebo hranu.</p>

<script>
(function() {
  var nodes = [];
  var edges = [];
  var nodeId = 0;
  var mode = 'node';
  var directed = false;
  var edgeStart = null;
  var dragNode = null;
  var dragOffset = { x: 0, y: 0 };

  var canvas = document.getElementById('canvas');
  var edgeSvg = document.getElementById('edgeSvg');

  var challenges = [
    { text: 'Sestavte strom se 4 uzly (souvislý, bez cyklů, 3 hrany)', check: function() {
      return nodes.length === 4 && edges.length === 3 && isConnected() && !hasCycle();
    }},
    { text: 'Sestavte graf, který obsahuje cyklus', check: function() {
      return nodes.length >= 3 && hasCycle();
    }},
    { text: 'Sestavte úplný graf K₃ (3 uzly, každý s každým)', check: function() {
      if (nodes.length !== 3) return false;
      var ids = nodes.map(function(n) { return n.id; });
      for (var i = 0; i < ids.length; i++) {
        for (var j = i + 1; j < ids.length; j++) {
          if (!hasEdgeBetween(ids[i], ids[j])) return false;
        }
      }
      return true;
    }}
  ];

  function resize() {
    parent.postMessage({ type: 'iframeResize', height: document.documentElement.scrollHeight }, '*');
  }

  function setMode(m) {
    mode = m;
    edgeStart = null;
    nodes.forEach(function(n) { n.el.classList.remove('selected'); });
    document.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('active'); });
    var btnMap = { node: 'btnNode', edge: 'btnEdge', delete: 'btnDelete', move: 'btnMove' };
    if (btnMap[m]) document.getElementById(btnMap[m]).classList.add('active');
    canvas.className = 'canvas-wrap mode-' + m;
  }
  window.setMode = setMode;

  canvas.addEventListener('click', function(e) {
    if (mode !== 'node') return;
    if (e.target !== canvas && e.target !== edgeSvg && e.target.tagName !== 'svg') return;
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    addNode(x, y);
  });

  canvas.addEventListener('mousedown', function(e) {
    if (mode !== 'move') return;
    var el = e.target.closest('.node');
    if (!el) return;
    var node = nodes.find(function(n) { return n.el === el; });
    if (!node) return;
    dragNode = node;
    var rect = canvas.getBoundingClientRect();
    dragOffset.x = e.clientX - rect.left - node.x;
    dragOffset.y = e.clientY - rect.top - node.y;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragNode) return;
    var rect = canvas.getBoundingClientRect();
    dragNode.x = Math.max(20, Math.min(rect.width - 20, e.clientX - rect.left - dragOffset.x));
    dragNode.y = Math.max(20, Math.min(rect.height - 20, e.clientY - rect.top - dragOffset.y));
    dragNode.el.style.left = dragNode.x + 'px';
    dragNode.el.style.top = dragNode.y + 'px';
    renderEdges();
  });

  document.addEventListener('mouseup', function() { dragNode = null; });

  function addNode(x, y) {
    var id = nodeId++;
    var el = document.createElement('div');
    el.className = 'node';
    el.textContent = 'v' + id;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      onNodeClick(id);
    });
    canvas.appendChild(el);
    var node = { id: id, x: x, y: y, el: el };
    nodes.push(node);
    analyze();
    resize();
  }

  function onNodeClick(id) {
    if (mode === 'delete') {
      removeNode(id);
    } else if (mode === 'edge') {
      if (edgeStart === null) {
        edgeStart = id;
        var n = nodes.find(function(n) { return n.id === id; });
        if (n) n.el.classList.add('selected');
      } else {
        if (edgeStart !== id) {
          if (!edgeExists(edgeStart, id)) {
            edges.push({ from: edgeStart, to: id });
          }
        }
        nodes.forEach(function(n) { n.el.classList.remove('selected'); });
        edgeStart = null;
        renderEdges();
        analyze();
        resize();
      }
    }
  }

  function removeNode(id) {
    edges = edges.filter(function(e) { return e.from !== id && e.to !== id; });
    var idx = nodes.findIndex(function(n) { return n.id === id; });
    if (idx >= 0) {
      nodes[idx].el.remove();
      nodes.splice(idx, 1);
    }
    renderEdges();
    analyze();
    resize();
  }

  function edgeExists(a, b) {
    return edges.some(function(e) {
      if (directed) return e.from === a && e.to === b;
      return (e.from === a && e.to === b) || (e.from === b && e.to === a);
    });
  }

  function hasEdgeBetween(a, b) {
    return edges.some(function(e) {
      return (e.from === a && e.to === b) || (e.from === b && e.to === a);
    });
  }

  function renderEdges() {
    while (edgeSvg.childNodes.length > 1) edgeSvg.removeChild(edgeSvg.lastChild);
    edges.forEach(function(e, idx) {
      var nf = nodes.find(function(n) { return n.id === e.from; });
      var nt = nodes.find(function(n) { return n.id === e.to; });
      if (!nf || !nt) return;

      var dx = nt.x - nf.x, dy = nt.y - nf.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var r = 20;
      var x1 = nf.x + (dx / dist) * r;
      var y1 = nf.y + (dy / dist) * r;
      var x2 = nt.x - (dx / dist) * r;
      var y2 = nt.y - (dy / dist) * r;

      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#555');
      line.setAttribute('stroke-width', '2');
      if (directed) line.setAttribute('marker-end', 'url(#arrowhead)');
      line.style.pointerEvents = 'stroke';
      line.style.cursor = mode === 'delete' ? 'not-allowed' : 'default';
      line.setAttribute('data-edge', idx);
      line.addEventListener('click', function() {
        if (mode === 'delete') {
          edges.splice(idx, 1);
          renderEdges();
          analyze();
          resize();
        }
      });
      edgeSvg.appendChild(line);
    });
  }

  function toggleDirected() {
    directed = document.getElementById('directedToggle').checked;
    renderEdges();
    analyze();
  }
  window.toggleDirected = toggleDirected;

  function clearAll() {
    nodes.forEach(function(n) { n.el.remove(); });
    nodes = [];
    edges = [];
    nodeId = 0;
    edgeStart = null;
    renderEdges();
    analyze();
    resize();
  }
  window.clearAll = clearAll;

  /* ---- Graph analysis ---- */
  function adj() {
    var a = {};
    nodes.forEach(function(n) { a[n.id] = []; });
    edges.forEach(function(e) {
      a[e.from].push(e.to);
      if (!directed) a[e.to].push(e.from);
    });
    return a;
  }

  function adjUndirected() {
    var a = {};
    nodes.forEach(function(n) { a[n.id] = []; });
    edges.forEach(function(e) {
      a[e.from].push(e.to);
      a[e.to].push(e.from);
    });
    return a;
  }

  function isConnected() {
    if (nodes.length <= 1) return true;
    var a = adjUndirected();
    var visited = {};
    var queue = [nodes[0].id];
    visited[nodes[0].id] = true;
    while (queue.length) {
      var cur = queue.shift();
      a[cur].forEach(function(nb) {
        if (!visited[nb]) { visited[nb] = true; queue.push(nb); }
      });
    }
    return Object.keys(visited).length === nodes.length;
  }

  function hasCycle() {
    if (directed) return hasCycleDirected();
    return hasCycleUndirected();
  }

  function hasCycleUndirected() {
    var a = adjUndirected();
    var visited = {};
    for (var i = 0; i < nodes.length; i++) {
      if (visited[nodes[i].id]) continue;
      if (dfsCycleUndir(nodes[i].id, -1, visited, a)) return true;
    }
    return false;
  }

  function dfsCycleUndir(v, parent, visited, a) {
    visited[v] = true;
    for (var i = 0; i < a[v].length; i++) {
      var nb = a[v][i];
      if (!visited[nb]) {
        if (dfsCycleUndir(nb, v, visited, a)) return true;
      } else if (nb !== parent) {
        return true;
      }
    }
    return false;
  }

  function hasCycleDirected() {
    var a = adj();
    var color = {}; // 0=white, 1=gray, 2=black
    nodes.forEach(function(n) { color[n.id] = 0; });
    for (var i = 0; i < nodes.length; i++) {
      if (color[nodes[i].id] === 0) {
        if (dfsCycleDir(nodes[i].id, color, a)) return true;
      }
    }
    return false;
  }

  function dfsCycleDir(v, color, a) {
    color[v] = 1;
    for (var i = 0; i < a[v].length; i++) {
      var nb = a[v][i];
      if (color[nb] === 1) return true;
      if (color[nb] === 0 && dfsCycleDir(nb, color, a)) return true;
    }
    color[v] = 2;
    return false;
  }

  function degrees() {
    var deg = {};
    nodes.forEach(function(n) { deg[n.id] = { in: 0, out: 0 }; });
    edges.forEach(function(e) {
      deg[e.from].out++;
      deg[e.to].in++;
      if (!directed) { deg[e.to].out++; deg[e.from].in++; }
    });
    return deg;
  }

  function isTree() {
    return nodes.length >= 1 && edges.length === nodes.length - 1 && isConnected() && !hasCycle();
  }

  function componentCount() {
    var a = adjUndirected();
    var visited = {};
    var count = 0;
    nodes.forEach(function(n) {
      if (!visited[n.id]) {
        count++;
        var queue = [n.id];
        visited[n.id] = true;
        while (queue.length) {
          var cur = queue.shift();
          a[cur].forEach(function(nb) {
            if (!visited[nb]) { visited[nb] = true; queue.push(nb); }
          });
        }
      }
    });
    return count;
  }

  function analyze() {
    var propsEl = document.getElementById('props');
    if (nodes.length === 0) {
      propsEl.innerHTML = '<div class="prop" style="color:#999;">Přidejte uzly kliknutím na plátno.</div>';
      renderChallenges();
      return;
    }

    var connected = isConnected();
    var tree = isTree();
    var cyclic = hasCycle();
    var comps = componentCount();
    var deg = degrees();
    var maxDeg = 0;
    nodes.forEach(function(n) {
      var d = directed ? deg[n.id].in + deg[n.id].out : deg[n.id].out;
      if (d > maxDeg) maxDeg = d;
    });

    var html = '';
    html += prop(connected, 'Souvislý', connected ? 'Ano — všechny uzly jsou dosažitelné' : 'Ne — graf má ' + comps + ' komponent(y)');
    html += prop(!cyclic, 'Acyklický', cyclic ? 'Ne — graf obsahuje cyklus' : 'Ano — neobsahuje cyklus');
    html += prop(tree, 'Strom', tree ? 'Ano — souvislý, acyklický, |E| = |V| − 1' : 'Ne');
    html += '<div class="prop" style="color:#555;">Uzly: ' + nodes.length + ' &nbsp;|&nbsp; Hrany: ' + edges.length + ' &nbsp;|&nbsp; Typ: ' + (directed ? 'orientovaný' : 'neorientovaný') + '</div>';

    propsEl.innerHTML = html;
    renderChallenges();
  }

  function prop(ok, label, detail) {
    return '<div class="prop"><span class="dot ' + (ok ? 'yes' : 'no') + '"></span><strong>' + label + ':</strong> ' + detail + '</div>';
  }

  function renderChallenges() {
    var el = document.getElementById('challenges');
    var html = '';
    challenges.forEach(function(c, i) {
      var done = c.check();
      html += '<div class="task">' + (i + 1) + '. ' + c.text +
        ' <span class="status ' + (done ? 'done' : 'pending') + '">' +
        (done ? '✓ Splněno' : '…') + '</span></div>';
    });
    el.innerHTML = html;
  }

  analyze();

  new ResizeObserver(function() { resize(); }).observe(document.documentElement);
  resize();
})();
</script>
</body>
</html>
