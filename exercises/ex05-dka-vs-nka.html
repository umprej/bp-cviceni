<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: DKA vs. NKA — klasifikace</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f4f4f4; color: #333; padding: 20px; line-height: 1.6; font-size: 14px;
}
h2 { margin-bottom: 6px; font-size: 1.3em; }
p.desc { margin-bottom: 16px; color: #555; }
.btn { display: inline-block; cursor: pointer; border: none; color: #fff; border-radius: 4px; padding: 7px 16px; font-size: 14px; margin-right: 6px; }
.btn-primary { background: #0f6cbf; }
.btn-primary:hover { background: #0d5da3; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.question { background: #fff; border-radius: 6px; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.question .label { font-family: monospace; font-size: 15px; margin-bottom: 10px; font-weight: 600; }
.feedback { padding: 8px 12px; border-radius: 4px; margin-top: 8px; font-size: 13px; }
.feedback.correct { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
.feedback.incorrect { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
.summary { background: #fff; border-radius: 6px; padding: 16px; margin-top: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 1.1em; font-weight: 600; }
</style>
</head>
<body>
<h2>Cvičení: DKA vs. NKA — klasifikace</h2>
<p class="desc">Určete, zda se jedná o deterministický (DKA) nebo nedeterministický (NKA) automat.</p>

<div id="questions"></div>
<div id="summary"></div>

<script>
(function(){
  const questions = [
    { text: '\u03B4(q\u2080, a) = q\u2081', answer: 'DKA', explanation: 'Pro každý stav a symbol existuje právě jeden přechod' },
    { text: '\u03B4(q\u2080, a) = {q\u2081, q\u2082}', answer: 'NKA', explanation: 'Z jednoho stavu vede pro symbol více přechodů' },
    { text: '\u03B4(q\u2081, \u03B5) = {q\u2082}', answer: 'NKA', explanation: 'Přechod bez čtení symbolu (epsilon-přechod)' },
    { text: '\u03B4: Q \u00D7 \u03A3 \u2192 P(Q)', answer: 'NKA', explanation: 'Přechodová funkce vrací množinu stavů' },
    { text: '\u03B4: Q \u00D7 \u03A3 \u2192 Q', answer: 'DKA', explanation: 'Přechodová funkce vrací právě jeden stav' },
    { text: 'Automat má více počátečních stavů I \u2286 Q', answer: 'NKA', explanation: 'Více počátečních stavů umožňují nedeterminismus' }
  ];

  let score = 0, answered = 0;
  const container = document.getElementById('questions');
  const summaryEl = document.getElementById('summary');

  function resize() {
    parent.postMessage({ type: 'iframeResize', height: document.documentElement.scrollHeight }, '*');
  }

  questions.forEach(function(q, i) {
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = '<div class="label">' + (i + 1) + '. ' + q.text + '</div>' +
      '<button class="btn btn-primary" data-q="' + i + '" data-val="DKA">DKA</button>' +
      '<button class="btn btn-primary" data-q="' + i + '" data-val="NKA">NKA</button>' +
      '<div id="fb' + i + '"></div>';
    container.appendChild(div);
  });

  container.addEventListener('click', function(e) {
    const btn = e.target;
    if (!btn.dataset.q) return;
    const idx = parseInt(btn.dataset.q);
    const fbEl = document.getElementById('fb' + idx);
    if (fbEl.innerHTML) return; // already answered

    const chosen = btn.dataset.val;
    const correct = questions[idx].answer === chosen;
    if (correct) score++;
    answered++;

    // disable buttons
    const btns = btn.parentElement.querySelectorAll('button');
    btns.forEach(function(b) { b.disabled = true; });

    fbEl.innerHTML = '<div class="feedback ' + (correct ? 'correct' : 'incorrect') + '">' +
      (correct ? '✓ Správně!' : '✗ Špatně. Správná odpověď: ' + questions[idx].answer) +
      ' — ' + questions[idx].explanation + '</div>';

    if (answered === questions.length) {
      summaryEl.innerHTML = '<div class="summary">Výsledek: ' + score + '/' + questions.length + ' správných odpovědí</div>';
    }
    resize();
  });

  window.addEventListener('load', resize);
  new MutationObserver(resize).observe(document.body, { childList: true, subtree: true });
})();
</script>
</body>
</html>
