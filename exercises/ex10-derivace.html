<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Derivace v regulární gramatice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f4f4f4; color: #333; padding: 20px; line-height: 1.6; font-size: 14px;
}
h2 { margin-bottom: 8px; font-size: 20px; }
p.desc { margin-bottom: 16px; color: #555; }
.grammar-box {
  background: #fff; border: 1px solid #dee2e6; border-radius: 6px;
  padding: 14px 18px; margin-bottom: 18px; font-family: monospace; font-size: 14px;
}
.step-box {
  background: #fff; border: 2px solid #0f6cbf; border-radius: 8px;
  padding: 20px; margin-bottom: 16px; text-align: center;
  background-color: #e7f3fe;
}
.step-formula {
  font-family: monospace; font-size: 18px; font-weight: 700;
  margin-bottom: 8px; letter-spacing: 1px;
}
.step-rule { font-size: 13px; color: #555; }
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 10px;
}
.btn {
  background: #0f6cbf; color: #fff; border: none; padding: 8px 18px;
  border-radius: 4px; cursor: pointer; font-size: 14px;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-secondary { background: #6c757d; }
.btn-reset { width: 100%; margin-bottom: 20px; }
.step-counter { font-size: 14px; font-weight: 600; min-width: 50px; text-align: center; }
.quiz-section {
  background: #fff; border: 1px solid #dee2e6; border-radius: 6px;
  padding: 16px 18px; margin-top: 8px;
}
.quiz-section h3 { font-size: 15px; margin-bottom: 10px; }
.quiz-row { display: flex; gap: 8px; margin-bottom: 10px; }
.quiz-row input[type="text"] {
  flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 14px; font-family: monospace;
}
.feedback {
  padding: 12px 16px; border-radius: 4px; display: none;
  font-size: 14px; border: 1px solid;
}
.feedback.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; display: block; }
.feedback.incorrect { background: #f8d7da; border-color: #f5c6cb; color: #721c24; display: block; }
</style>
</head>
<body>
<h2>Cvičení: Derivace v regulární gramatice</h2>
<p class="desc">Gramatika G = ({S, A}, {a, b}, P, S) s pravidly: S → aA, A → bS | ε</p>

<div class="step-box" id="stepBox">
  <div class="step-formula" id="stepFormula"></div>
  <div class="step-rule" id="stepRule"></div>
</div>

<div class="nav-row">
  <button class="btn" id="btnPrev" onclick="prevStep()">← Zpět</button>
  <span class="step-counter" id="stepCounter"></span>
  <button class="btn" id="btnNext" onclick="nextStep()">Dál →</button>
</div>

<button class="btn btn-secondary btn-reset" onclick="resetStepper()">Resetovat</button>

<div class="quiz-section">
  <h3>Jaký jazyk tato gramatika generuje?</h3>
  <div class="quiz-row">
    <input type="text" id="quizInput" placeholder="L = ...">
    <button class="btn" onclick="checkQuiz()">Zkontrolovat</button>
  </div>
  <div class="feedback" id="quizFeedback"></div>
</div>

<script>
const steps = [
  { formula: 'S', rule: 'Počáteční symbol' },
  { formula: 'aA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'abS', rule: 'Použité pravidlo: A → bS' },
  { formula: 'abaA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'ababS', rule: 'Použité pravidlo: A → bS' },
  { formula: 'ababaA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'ababa', rule: 'Použité pravidlo: A → ε' }
];

let current = 0;

function renderStep() {
  document.getElementById('stepFormula').textContent = steps[current].formula;
  document.getElementById('stepRule').textContent = steps[current].rule;
  document.getElementById('stepCounter').textContent = (current + 1) + ' / ' + steps.length;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === steps.length - 1;
}

function prevStep() { if (current > 0) { current--; renderStep(); } }
function nextStep() { if (current < steps.length - 1) { current++; renderStep(); } }
function resetStepper() { current = 0; renderStep(); }

function checkQuiz() {
  const val = document.getElementById('quizInput').value.trim();
  const fb = document.getElementById('quizFeedback');
  // Accept if answer contains (ab) or ab* or (ab)^ or (ab)n
  const correct = /\(ab\)/.test(val) || /ab\*/.test(val) || /\(ab\)\^/.test(val) || /\(ab\)n/.test(val);
  if (correct) {
    fb.className = 'feedback correct';
    fb.textContent = '✓ Správně! Jazyk L = {(ab)^n | n ≥ 0} se skládá z libovolného počtu opakování řetězce "ab".';
  } else {
    fb.className = 'feedback incorrect';
    fb.textContent = '✗ Chybně. Nápověda: Gramatika generuje řetězce tvaru (ab)\u207F, tedy opakování \u201Eab\u201C (včetně prázdného slova).';
  }
}

renderStep();

// Iframe resize messaging
function sendHeight() {
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'iframeResize', height: h }, '*');
}
const ro = new ResizeObserver(sendHeight);
ro.observe(document.body);
window.addEventListener('load', sendHeight);
</script>
</body>
</html>
