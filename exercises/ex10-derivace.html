<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Derivace v regulární gramatice</title>
<link rel="stylesheet" href="exercises.css">
</head>
<body>
<h2>Cvičení: Derivace v regulární gramatice</h2>
<p class="desc">Gramatika G = ({S, A}, {a, b}, P, S) s pravidly: S → aA, A → bS | ε</p>

<div class="deriv-box" id="stepBox">
  <div class="deriv-formula" id="stepFormula"></div>
  <div class="deriv-rule" id="stepRule"></div>
</div>

<div class="nav-row">
  <button class="btn" id="btnPrev" onclick="prevStep()">← Zpět</button>
  <span class="step-counter" id="stepCounter"></span>
  <button class="btn" id="btnNext" onclick="nextStep()">Dál →</button>
</div>

<button class="btn btn-secondary" style="width:100%;margin-bottom:20px;" onclick="resetStepper()">Resetovat</button>

<div class="quiz-section">
  <h3>Jaký jazyk tato gramatika generuje?</h3>
  <div class="quiz-row">
    <input type="text" id="quizInput" placeholder="L = ...">
    <button class="btn" onclick="checkQuiz()">Zkontrolovat</button>
  </div>
  <div class="feedback" id="quizFeedback"></div>
</div>

<script src="exercises.js"></script>
<script>
// Krokova derivace v regularni gramatice G = ({S, A}, {a, b}, P, S)
// Ukazuje postupne pouziti pravidel a na konci kviz na rozpoznani jazyka

// Jednotlive kroky derivace retezce "ababa"
var steps = [
  { formula: 'S', rule: 'Počáteční symbol' },
  { formula: 'aA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'abS', rule: 'Použité pravidlo: A → bS' },
  { formula: 'abaA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'ababS', rule: 'Použité pravidlo: A → bS' },
  { formula: 'ababaA', rule: 'Použité pravidlo: S → aA' },
  { formula: 'ababa', rule: 'Použité pravidlo: A → ε' }
];

var current = 0;

// Zobrazeni aktualniho kroku derivace
function renderStep() {
  setText('stepFormula', steps[current].formula);
  setText('stepRule', steps[current].rule);
  setText('stepCounter', (current + 1) + ' / ' + steps.length);
  $('btnPrev').disabled = current === 0;
  $('btnNext').disabled = current === steps.length - 1;
}

function prevStep() { if (current > 0) { current--; renderStep(); } }
function nextStep() { if (current < steps.length - 1) { current++; renderStep(); } }
function resetStepper() { current = 0; renderStep(); }

// Overeni odpovedi na otazku jaky jazyk gramatika generuje
function checkQuiz() {
  var val = $('quizInput').value.trim();
  var fb = $('quizFeedback');
  // Akceptujeme ruzne zpusoby zapisu jazyka (ab)^n
  var correct = /\(ab\)/.test(val) || /ab\*/.test(val) || /\(ab\)\^/.test(val) || /\(ab\)n/.test(val);
  if (correct) {
    fb.className = 'feedback correct';
    fb.textContent = '✓ Správně! Jazyk L = {(ab)^n | n ≥ 0} se skládá z libovolného počtu opakování řetězce "ab".';
  } else {
    fb.className = 'feedback incorrect';
    fb.textContent = '✗ Chybně. Nápověda: Gramatika generuje řetězce tvaru (ab)\u207F, tedy opakování \u201Eab\u201C (včetně prázdného slova).';
  }
}

renderStep();
</script>
</body>
</html>
