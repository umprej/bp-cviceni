<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Simulátor DKA — krokování</title>
<link rel="stylesheet" href="exercises.css">
</head>
<body>
<h2>Cvičení: Simulátor DKA — krokování</h2>
<p class="desc">DFA přijímá slova nad abecedou {a, b} obsahující podřetězec "ab".</p>

<div class="section">
  <svg id="diagram" width="420" height="140" viewBox="0 0 420 140">
    <!-- arrow into q0 -->
    <defs><marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker></defs>
    <line x1="10" y1="70" x2="45" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <!-- q0 -->
    <circle id="cq0" cx="80" cy="70" r="28" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="80" y="75" text-anchor="middle" font-size="15" fill="#333">q&#x2080;</text>
    <!-- q0 self-loop b -->
    <path d="M68,44 C55,10 105,10 92,44" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="80" y="18" text-anchor="middle" font-size="13" fill="#333">b</text>
    <!-- q0 -> q1 a -->
    <line x1="108" y1="70" x2="172" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="140" y="63" text-anchor="middle" font-size="13" fill="#333">a</text>
    <!-- q1 -->
    <circle id="cq1" cx="200" cy="70" r="28" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="200" y="75" text-anchor="middle" font-size="15" fill="#333">q&#x2081;</text>
    <!-- q1 self-loop a -->
    <path d="M188,44 C175,10 225,10 212,44" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="200" y="18" text-anchor="middle" font-size="13" fill="#333">a</text>
    <!-- q1 -> q2 b -->
    <line x1="228" y1="70" x2="292" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="260" y="63" text-anchor="middle" font-size="13" fill="#333">b</text>
    <!-- q2 -->
    <circle id="cq2" cx="320" cy="70" r="28" fill="#fff" stroke="#333" stroke-width="2"/>
    <circle cx="320" cy="70" r="23" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="320" y="75" text-anchor="middle" font-size="15" fill="#333">q&#x2082;</text>
    <!-- q2 self-loop a,b -->
    <path d="M308,44 C295,10 345,10 332,44" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="320" y="18" text-anchor="middle" font-size="13" fill="#333">a, b</text>
  </svg>
</div>

<div class="section">
  <div class="input-row">
    <label><strong>Vstupní slovo:</strong></label>
    <input type="text" id="wordInput" value="abba" maxlength="20"/>
    <button class="btn btn-primary" id="btnStep">Další krok</button>
    <button class="btn btn-success" id="btnRunAll">Spustit vše</button>
    <button class="btn btn-secondary" id="btnReset">Reset</button>
  </div>
  <div id="errorMsg" class="error-msg"></div>
  <div id="tapeContainer" class="tape"></div>
</div>

<div class="section">
  <strong>Historie přechodů:</strong>
  <div id="log" class="log"></div>
</div>

<div id="verdictContainer"></div>

<script src="exercises.js"></script>
<script>
// Simulator deterministickeho konecneho automatu (DKA/DFA)
// Prijima slova nad {a,b} obsahujici podretezec "ab"
(function(){
  // prechodova funkce delta(stav, symbol) -> novy stav
  var delta = {
    'q0': { 'a': 'q1', 'b': 'q0' },
    'q1': { 'a': 'q1', 'b': 'q2' },
    'q2': { 'a': 'q2', 'b': 'q2' }
  };
  var accepting = { 'q2': true }; // prijimajici stavy
  var stateLabels = { 'q0': 'q\u2080', 'q1': 'q\u2081', 'q2': 'q\u2082' };

  var word = '', pos = 0, currentState = 'q0', running = false;

  var wordInput = $('wordInput');
  var tapeContainer = $('tapeContainer');
  var log = $('log');
  var verdictContainer = $('verdictContainer');
  var errorMsg = $('errorMsg');
  var btnStep = $('btnStep');
  var btnRunAll = $('btnRunAll');
  var btnReset = $('btnReset');

  // Zvyrazni aktualni stav v diagramu (oranzova)
  function highlightState(s) {
    ['cq0','cq1','cq2'].forEach(function(id) {
      $(id).setAttribute('fill', id === 'c' + s ? '#ffe0b2' : '#fff');
    });
  }

  // Validace vstupu - jen a a b, max 20 znaku
  function validate(w) {
    if (w.length === 0) return 'Zadejte alespoň jeden symbol.';
    if (w.length > 20) return 'Maximální délka je 20 znaků.';
    if (!/^[ab]+$/.test(w)) return 'Povoleny jsou pouze symboly a, b.';
    return '';
  }

  // Sestavi pasku se symboly slova
  function buildTape() {
    tapeContainer.innerHTML = '';
    for (var i = 0; i < word.length; i++) {
      var cell = el('div', { cls: 'tape-cell', text: word[i], attrs: { id: 'tc' + i } });
      tapeContainer.appendChild(cell);
    }
  }

  // Aktualizuje barvy bunek - zpracovane, aktivni, cekajici
  function updateTape() {
    for (var i = 0; i < word.length; i++) {
      var cell = $('tc' + i);
      if (i < pos) cell.className = 'tape-cell done';
      else if (i === pos) cell.className = 'tape-cell active';
      else cell.className = 'tape-cell';
    }
  }

  // Inicializace simulace - validace a nastaveni pocatecniho stavu
  function init() {
    var w = wordInput.value.trim();
    var err = validate(w);
    errorMsg.textContent = err;
    if (err) return false;
    word = w;
    pos = 0;
    currentState = 'q0';
    running = true;
    log.innerHTML = '';
    verdictContainer.innerHTML = '';
    buildTape();
    updateTape();
    highlightState('q0');
    btnStep.disabled = false;
    btnRunAll.disabled = false;
    wordInput.disabled = true;
    notifyResize();
    return true;
  }

  // Jeden krok simulace - precte symbol, aplikuje delta, posune se
  function step() {
    if (pos >= word.length) { finish(); return; }
    var sym = word[pos];
    var prev = currentState;
    currentState = delta[prev][sym]; // prechod do dalsiho stavu
    pos++;
    // zalogovat prechod
    var entry = el('div', { cls: 'log-entry', text: '\u03B4(' + stateLabels[prev] + ', ' + sym + ') = ' + stateLabels[currentState] });
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    updateTape();
    highlightState(currentState);
    if (pos >= word.length) finish();
    notifyResize();
  }

  // Konec simulace - urcit jestli automat slovo prijal nebo zamitl
  function finish() {
    running = false;
    btnStep.disabled = true;
    btnRunAll.disabled = true;
    var acc = accepting[currentState];
    verdictContainer.innerHTML = '<div class="verdict ' + (acc ? 'accept' : 'reject') + '">' +
      (acc ? 'Slovo "' + word + '" je <strong>přijato</strong> (koncový stav ' + stateLabels[currentState] + ').'
           : 'Slovo "' + word + '" je <strong>zamítnuto</strong> (stav ' + stateLabels[currentState] + ' není přijímající).') +
      '</div>';
    notifyResize();
  }

  // Dalsi krok - pokud simulace jeste nebezi, inicializovat
  btnStep.addEventListener('click', function() {
    if (!running && !init()) return;
    step();
  });

  // Spustit vsechny kroky najednou
  btnRunAll.addEventListener('click', function() {
    if (!running && !init()) return;
    while (pos < word.length) step();
  });

  // Reset - vsechno zpet do puvodniho stavu
  btnReset.addEventListener('click', function() {
    running = false;
    wordInput.disabled = false;
    btnStep.disabled = false;
    btnRunAll.disabled = false;
    log.innerHTML = '';
    verdictContainer.innerHTML = '';
    tapeContainer.innerHTML = '';
    errorMsg.textContent = '';
    highlightState('');
    notifyResize();
  });
})();
</script>
</body>
</html>
