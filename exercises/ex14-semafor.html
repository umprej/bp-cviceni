<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cvičení: Semafor — praktický konečný automat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f4f4f4; color: #333; padding: 20px; line-height: 1.6; font-size: 14px;
}
h2 { margin-bottom: 8px; }
p.desc { margin-bottom: 16px; }
.lights { display: flex; gap: 24px; justify-content: center; margin-bottom: 20px; }
.light {
  width: 64px; height: 64px; border-radius: 50%; border: 3px solid #999;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; transition: all 0.3s;
}
.light.inactive { background: #ddd; color: transparent; }
.light.green.active { background: #28a745; color: #fff; border-color: #28a745; }
.light.yellow.active { background: #ffc107; color: #333; border-color: #ffc107; }
.light.red.active { background: #dc3545; color: #fff; border-color: #dc3545; }
.btn { background: #0f6cbf; color: #fff; border: none; border-radius: 4px; padding: 7px 16px; cursor: pointer; font-size: 14px; margin-right: 8px; }
.btn:hover { opacity: 0.9; }
.btn-secondary { background: #6c757d; }
.history { margin-top: 16px; padding: 10px 14px; background: #fff; border: 1px solid #ddd; border-radius: 4px; min-height: 24px; }
.history-label { font-weight: 600; margin-bottom: 4px; }
</style>
</head>
<body>
<h2>Cvičení: Semafor — praktický konečný automat</h2>
<p class="desc">Simulace jednoduchých přechodů semaforu. Klikněte na tlačítko pro časový impuls.</p>

<div class="lights">
  <div class="light green active" id="light-green">Zelená</div>
  <div class="light yellow inactive" id="light-yellow">Žlutá</div>
  <div class="light red inactive" id="light-red">Červená</div>
</div>

<div style="text-align:center;">
  <button class="btn" onclick="advance()">Časový impuls</button>
  <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
</div>

<div class="history">
  <div class="history-label">Historie přechodů:</div>
  <div id="historyText">Zelená</div>
</div>

<script>
var states = [
  { id: 'green', label: 'Zelená' },
  { id: 'yellow', label: 'Žlutá' },
  { id: 'red', label: 'Červená' }
];
var current = 0;
var history = ['Zelená'];

function render() {
  states.forEach(function(s, i) {
    var el = document.getElementById('light-' + s.id);
    if (i === current) {
      el.className = 'light ' + s.id + ' active';
    } else {
      el.className = 'light ' + s.id + ' inactive';
    }
  });
  document.getElementById('historyText').textContent = history.join(' \u2192 ');
}

function advance() {
  current = (current + 1) % 3;
  history.push(states[current].label);
  render();
}

function resetAll() {
  current = 0;
  history = ['Zelená'];
  render();
}

/* iframe resize messaging */
function sendHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'iframeResize', height: h }, '*');
}
var ro = new ResizeObserver(sendHeight);
ro.observe(document.body);
window.addEventListener('load', sendHeight);
</script>
</body>
</html>
